name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: verge
          POSTGRES_PASSWORD: verge
          POSTGRES_DB: verge
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U verge -d verge"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      CI: "1"
      DATABASE_URL: postgresql://verge:verge@127.0.0.1:5432/verge
      VERGE_INTEGRATION_DATABASE_URL: postgresql://verge:verge@127.0.0.1:5432/verge
      GITHUB_WEBHOOK_SECRET: integration-secret
      VERGE_ALLOWED_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Validate docs
        run: pnpm docs:validate

      - name: Build
        run: pnpm build

      - name: Run unit tests
        run: pnpm test

      - name: Run DB integration tests
        run: pnpm test:integration

      - name: Run self-host smoke test
        run: pnpm test:smoke
